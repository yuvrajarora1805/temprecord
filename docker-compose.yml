version: '3.8'
services:
  app:
    build: .
    container_name: temprecord-app
    ports:
      - "4000:4000"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=root_password
      - DB_DATABASE_WORKERMANAGE=tempassignments_db
      - DB_DATABASE_TEMP=tempassignments_db
    depends_on:
      - db
    restart: always

  db:
    image: mariadb:10.11
    container_name: temprecord-db
    environment:
      - MARIADB_ROOT_PASSWORD=root_password
      - MARIADB_DATABASE=tempassignments_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always

volumes:
  db_data:
